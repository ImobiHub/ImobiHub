services:
  api:
    build:
      context: ./ImobiHub.API
      dockerfile: Dockerfile
    container_name: imobihub-api
    ports:
      - "5000:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: imobihub-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: imobihub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: